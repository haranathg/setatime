name: Deploy SetATime

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-west-2
  AWS_ROLE_ARN: arn:aws:iam::158291236521:role/setatime-github-deploy
  S3_BUCKET: setatime-frontend-us-west-2
  CLOUDFRONT_DISTRIBUTION_ID: E26AJUHQAV6UYQ
  AI_FUNCTION: setatime-ai-breakdown
  SYNC_FUNCTION: setatime-sync
  VITE_AI_API_URL: https://p7r6m54moa.execute-api.us-west-2.amazonaws.com/ai-breakdown
  VITE_SYNC_API_URL: https://p7r6m54moa.execute-api.us-west-2.amazonaws.com/sync

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so `git rev-list --count HEAD` in the build step
          # produces a monotonically increasing build number. Also needed for
          # the Lambda-change-detection step to diff against the prior commit.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version.split('.').slice(0,2).join('.')")
          BUILD_NUMBER=$(git rev-list --count HEAD)
          export VITE_APP_VERSION="${BASE_VERSION}.${BUILD_NUMBER}"
          export VITE_BUILD_SHA="${GITHUB_SHA:0:7}"
          export VITE_BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "Building v$VITE_APP_VERSION ($VITE_BUILD_SHA, $VITE_BUILD_TIME)"
          npm run build
        env:
          VITE_AI_API_URL: ${{ env.VITE_AI_API_URL }}
          VITE_SYNC_API_URL: ${{ env.VITE_SYNC_API_URL }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Detect Lambda changes
        id: lambda-changed
        run: |
          git fetch origin ${{ github.event.before }} --depth=1 2>/dev/null || true
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "ai_changed=true" >> $GITHUB_OUTPUT
            echo "sync_changed=true" >> $GITHUB_OUTPUT
          else
            if git diff --name-only "$BEFORE" HEAD | grep -q '^lambda/ai-breakdown/'; then
              echo "ai_changed=true" >> $GITHUB_OUTPUT
            else
              echo "ai_changed=false" >> $GITHUB_OUTPUT
            fi
            if git diff --name-only "$BEFORE" HEAD | grep -q '^lambda/sync/'; then
              echo "sync_changed=true" >> $GITHUB_OUTPUT
            else
              echo "sync_changed=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Deploy AI breakdown Lambda
        if: steps.lambda-changed.outputs.ai_changed == 'true'
        run: |
          cd lambda/ai-breakdown
          zip -j /tmp/setatime-ai.zip index.mjs
          aws lambda update-function-code \
            --function-name ${{ env.AI_FUNCTION }} \
            --zip-file fileb:///tmp/setatime-ai.zip \
            --region ${{ env.AWS_REGION }}

      - name: Deploy sync Lambda
        if: steps.lambda-changed.outputs.sync_changed == 'true'
        run: |
          cd lambda/sync
          zip -j /tmp/setatime-sync.zip index.mjs
          aws lambda update-function-code \
            --function-name ${{ env.SYNC_FUNCTION }} \
            --zip-file fileb:///tmp/setatime-sync.zip \
            --region ${{ env.AWS_REGION }}

      - name: Sync frontend to S3
        run: |
          aws s3 sync dist s3://${{ env.S3_BUCKET }} \
            --delete \
            --region ${{ env.AWS_REGION }}

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*" \
            --region ${{ env.AWS_REGION }}

      - name: Deploy summary
        run: |
          echo "## Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: https://d1bycim0bytkm9.cloudfront.net" >> $GITHUB_STEP_SUMMARY
          echo "- AI Lambda updated: ${{ steps.lambda-changed.outputs.ai_changed }}" >> $GITHUB_STEP_SUMMARY
          echo "- Sync Lambda updated: ${{ steps.lambda-changed.outputs.sync_changed }}" >> $GITHUB_STEP_SUMMARY
